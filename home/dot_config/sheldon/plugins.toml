# `sheldon` configuration file
# ----------------------------
#
# You can modify this file directly or you can use one of the following
# `sheldon` commands which are provided to assist in editing the config file:
#
# - `sheldon add` to add a new plugin to the config file
# - `sheldon edit` to open up the config file in the default editor
# - `sheldon remove` to remove a plugin from the config file
#
# See the documentation for more https://github.com/rossmacarthur/sheldon#readme

shell = "zsh"

#
# Sheldon Templates
#

[templates]
defer = """
{{ hooks?.pre | nl }}
{% for file in files %}
zsh-defer source "{{ file }}"
{% endfor %}
{{ hooks?.post | nl }}
"""

defer-more = """
{{ hooks?.pre | nl }}
{% for file in files %}
zsh-defer -t 0.5 source "{{ file }}"\n
{% endfor %}{{ hooks?.post | nl }}
"""

fzf-install = """
{{ hooks?.pre | nl }}
{{ dir }}/install --bin > /dev/null
path=($path {{ dir }}/bin(N-/))
{{ hooks?.post | nl }}
"""

fzf-source = "source <(fzf --zsh)"

#
# Plugins
#

[plugins]

# Deferred Loading of Plugins in Zsh
[plugins.zsh-defer]
github = 'romkatv/zsh-defer'
apply = ['source']

# Autoloading of Functions in Zsh
[plugins.compinit]
inline = 'autoload -Uz compinit && zsh-defer compinit'

# Fuzzy finder
[plugins.fzf]
github = 'junegunn/fzf'
apply = ['fzf-install']
hooks.post = '''
export FZF_DEFAULT_OPTS="--reverse"
'''

# ZSH Completions
[plugins.zsh-completions]
github = 'zsh-users/zsh-completions'
apply = ['defer']

# Syntax highlighting
[plugins.zsh-syntax-highlighting]
github = 'zsh-users/zsh-syntax-highlighting'
apply = ['defer']

# History substring search
[plugins.zsh-history-substring-search]
github = 'zsh-users/zsh-history-substring-search'
apply = ['defer']

# oh-my-zsh
[plugins.oh-my-zsh]
github = "ohmyzsh/ohmyzsh"
use = [
    # Load necessary functions first
    'lib/functions.zsh',
    # Load other useful libraries
    'lib/completion.zsh',
    'lib/history.zsh',
    'lib/termsupport.zsh',
    # Load some plugins
    'plugins/eza/eza.plugin.zsh',
    'plugins/fzf/fzf.plugin.zsh',
    'plugins/macos/macos.plugin.zsh',
    'plugins/mise/mise.plugin.zsh',
    'plugins/starship/starship.plugin.zsh',
]

# Zoxide
[plugins.zoxide]
github = "ajeetdsouza/zoxide"

# Syntax highlighting
[plugins.zsh-bd]
github = 'Tarrasch/zsh-bd'
apply = ['defer']

# Set language
[plugins.lang]
inline = '''
function _lang() {
    export LANG='en_US.UTF-8'
}
zsh-defer _lang
'''

[plugins.go]
inline = '''
function _go() {
    export GOPATH="${HOME}/ghq"

    typeset -gU path
    path=(
        $path
        ${GOPATH}/bin(N-/)
    )
}
zsh-defer _go
'''

[plugins.rust]
inline = '''
function _rust() {
    typeset -gU path
    path=(
        $path
        ${HOME}/.cargo/bin(N-/)
    )
}
zsh-defer _rust
'''

[plugins.bun]
inline = '''
export BUN_INSTALL="$HOME/.bun"

typeset -gU path
path+=(
    $BUN_INSTALL/bin(N-/)
)

# bun completions
[ -s "$HOME/.bun/_bun" ] && zsh-defer "$HOME/.bun/_bun"
'''

# Aliases
[plugins.common-alias]
local = '~/.config/alias'
use = ['common.sh']
apply = ['source']

[plugins.gpg]
inline = '''
function _gpg() {
    export GPG_TTY=$(tty)
}
zsh-defer _gpg
'''

# Prompt
# [plugins.starship]
# inline = 'eval "$(starship init zsh)"'

[plugins.git-open]
github = "paulirish/git-open"
apply = ["defer"]

[plugins.homebrew]
inline = '''
function _homebrew() {
    # Disable installing certain formulae
    export HOMEBREW_FORBIDDEN_FORMULAE="node python python3 pip npm pnpm yarn claude"
}
zsh-defer _homebrew
'''

[plugins.macos-path]
inline = '''
function _macos_path() {
    typeset -gU path
    path=(
        $path
        /opt/{homebrew,local}/{,s}bin(N-/)
    )
}
zsh-defer _macos_path
'''

[plugins.macos-browser]
inline = '''
function _macos_browser() {
    if [[ -z "$BROWSER" && "$OSTYPE" == darwin* ]]; then
        export BROWSER='open'
    fi
}
zsh-defer _macos_browser
'''
